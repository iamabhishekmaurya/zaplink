server:
    port: 8081

# gRPC Server Configuration
grpc:
  server:
    port: 50051

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: zaplink-core-service
  # API versioning
  mvc:
    apiversion:
      required: true
      use:
        header: X-API-Version
      supported:
      - 1
  # Enable Virtual Threads (Project Loom)
  threads:
      virtual:
          enabled: true
  # DataSource config
  datasource:
    url: jdbc:postgresql://localhost:5432/zaplink_local?currentSchema=core
    username: postgres
    password: 12345
  # JPA config
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: core

#Custom properties
redirect:
  base:
    url: http://localhost:8090/r/

springdoc:
  packages-to-scan: io.zaplink.core.controller
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
  show-actuator: true


# Distributed Tracing Configuration
management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
