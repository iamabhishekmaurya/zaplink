server:
  port: 8090

api:
  base-path: /api

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import: application-api.yml
  application:
    name: api-gateway-service
  threads:
    virtual:
      enabled: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:myZaplinkSecretKeyForJWTTokenGenerationAndValidation}
  expiration: ${JWT_EXPIRATION:1800} # 30 minutes in secondsmanagement:
# Distributed Tracing Configuration
management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
